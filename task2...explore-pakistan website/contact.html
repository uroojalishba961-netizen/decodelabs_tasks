<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Explore Pakistan - Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <nav class="navbar">
      <a href="index.html" class="navbar__logo">Explore<span>Pakistan</span></a>

      <button class="navbar__toggle" id="navToggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <ul class="navbar__menu" id="navMenu">
        <li><a href="index.html">Home</a></li>
        <li><a href="destinations.html">Destinations</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
    <div class="navbar__overlay" id="navOverlay"></div>
  </header>

  <main>
    <section class="page-hero">
      <h1>Get in Touch</h1>
      <p>Have a question or suggestion? We'd love to hear from you.</p>
    </section>

    <section class="content-block">
      <form class="contact-form">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Your Message" required></textarea>
        <button type="submit" class="btn">Send Message</button>
      </form>

      <br>
      <p style="text-align:center;">
        📞 +92 300 1234567 &nbsp;|&nbsp; ✉ info@explorepakistan.com
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Explore Pakistan. All rights reserved.</p>
    <div class="site-footer__links">
      <a href="about.html">About</a>
      <a href="destinations.html">Destinations</a>
      <a href="contact.html">Contact</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
